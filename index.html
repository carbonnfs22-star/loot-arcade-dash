<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOOT ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0a1a;color:#e8e0ff;font-family:"Press Start 2P",monospace;font-size:10px;line-height:1.8;min-height:100vh;overflow-x:hidden}
.scanlines{pointer-events:none;position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 3px);z-index:99}
.crt{padding:16px;max-width:520px;margin:0 auto;position:relative}
h1{font-size:14px;color:#ff6ec7;text-shadow:2px 2px #00d4ff;margin-bottom:8px;animation:blink 2s step-end infinite}
@keyframes blink{50%{opacity:.85}}
.sub{color:#8b7aa8;font-size:8px;margin-bottom:14px}
.panel{border:3px solid #5a4a8a;background:#1a1230;padding:12px;margin-bottom:12px;box-shadow:4px 4px 0 #000}
.panel h2{font-size:9px;color:#00d4ff;margin-bottom:8px}
.big{font-size:12px;color:#ffe66d}
.pos{color:#7cfc7c}.neg{color:#ff6b6b}
.ticker{height:28px;overflow:hidden;border:2px solid #3d2d6a;background:#120c22;margin-bottom:12px;position:relative}
.ticker-inner{animation:scroll 12s linear infinite;white-space:nowrap;padding:6px}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.sprite{display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:8px;color:#b8a0e8}
.coin{width:16px;height:16px;background:#ffe66d;border-radius:50%;animation:bounce 1s ease infinite;box-shadow:0 0 8px #ffe66d88}
.coin:nth-child(2){animation-delay:.2s;background:#7cfc7c;box-shadow:0 0 8px #7cfc7c88}
.coin:nth-child(3){animation-delay:.4s;background:#ff6ec7;box-shadow:0 0 8px #ff6ec788}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
table{width:100%;border-collapse:collapse;font-size:8px}
td,th{padding:6px 4px;border-bottom:1px dashed #3d2d6a;text-align:left}
th{color:#00d4ff}
.rank-num{color:#ff6ec7;width:20px}
a{color:#00d4ff;text-decoration:none}
a:hover{color:#ffe66d}
.footer{margin-top:16px;font-size:7px;color:#6a5a8a;text-align:center}
.bar{height:6px;background:#2a1f45;margin-top:4px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#7cfc7c,#00d4ff);max-width:100%}
</style></head><body>
<div class="scanlines"></div>
<div class="crt">
<h1>◆ LOOT ARCADE ◆</h1>
<p class="sub" id="upd">LOADING...</p>
<div class="sprite"><div class="coin"></div><div class="coin"></div><div class="coin"></div><span id="tickerTxt">SCAN · BUY · HOLD · SELL ·</span></div>
<div class="ticker"><div class="ticker-inner" id="tick">▶ боты работают...</div></div>

<div class="panel"><h2>◈ КОШЕЛЁК</h2>
<p>PAPER <span class="big" id="peq">$0</span></p>
<p class="sub">старт <span id="pcap">$0</span> · профит <span id="pprof" class="pos">$0</span></p>
<p style="margin-top:8px">LIVE KuCoin <span class="big" id="real">$0</span></p>
<p class="sub" id="kcst">KuCoin API</p>
</div>

<div class="panel"><h2>◈ MARKET v2</h2>
<p id="mkt">—</p></div>

<div class="panel"><h2>◈ TOP BOTS</h2>
<table><thead><tr><th>#</th><th>BOT</th><th>$</th><th>P&L</th></tr></thead>
<tbody id="rank"></tbody></table></div>

<p class="footer"><a href="details.html">► ПОЛНЫЙ ДАШБОРД</a><br>обновление / 6ч · F5</p>
</div>
<script>
const D={"updated": "17.06.2026 11:00 UTC", "next_hint": "обновление каждые 6 ч", "paper_equity": 33044.49, "paper_capital": 32300.0, "paper_profit": 744.49, "real_usdt": 0.0, "kucoin_ok": true, "market_v2_score": 23, "market_v2_action": "ЖДАТЬ", "rank": [{"id": "U", "name": "Sniper-Deep", "branch": "sniper2", "capital": 1000.0, "equity": 1611.64, "profit_usd": 611.64, "profit_pct": 61.16}, {"id": "I", "name": "Sniper2", "branch": "spot", "capital": 1000.0, "equity": 1611.1, "profit_usd": 611.1, "profit_pct": 61.11}, {"id": "V", "name": "Sniper-Vol", "branch": "sniper2", "capital": 1000.0, "equity": 1077.59, "profit_usd": 77.59, "profit_pct": 7.76}, {"id": "T", "name": "Sniper-Fast", "branch": "sniper2", "capital": 1000.0, "equity": 1055.07, "profit_usd": 55.07, "profit_pct": 5.51}, {"id": "R", "name": "Sniper-Tight", "branch": "sniper2", "capital": 1000.0, "equity": 1042.65, "profit_usd": 42.65, "profit_pct": 4.26}, {"id": "S", "name": "Sniper-Wide", "branch": "sniper2", "capital": 1000.0, "equity": 1040.7, "profit_usd": 40.7, "profit_pct": 4.07}, {"id": "G", "name": "Meme", "branch": "spot", "capital": 1000.0, "equity": 1027.39, "profit_usd": 27.39, "profit_pct": 2.74}, {"id": "Y", "name": "Fund-Short", "branch": "futures", "capital": 500.0, "equity": 515.99, "profit_usd": 15.99, "profit_pct": 3.2}, {"id": "Z", "name": "Mom-Perp", "branch": "futures", "capital": 500.0, "equity": 513.92, "profit_usd": 13.92, "profit_pct": 2.78}, {"id": "W", "name": "Perp-Sniper", "branch": "futures", "capital": 500.0, "equity": 512.16, "profit_usd": 12.16, "profit_pct": 2.43}, {"id": "E", "name": "MeanRev", "branch": "spot", "capital": 1000.0, "equity": 1007.4, "profit_usd": 7.4, "profit_pct": 0.74}, {"id": "N", "name": "Scalp-Perp", "branch": "futures", "capital": 500.0, "equity": 506.99, "profit_usd": 6.99, "profit_pct": 1.4}]};
const $=id=>document.getElementById(id);
const usd=n=>"$"+Number(n).toFixed(0);
const f=n=>(n>=0?"+":"")+Number(n).toFixed(1)+"%";
$("upd").textContent="UPD "+D.updated+" · "+D.next_hint;
$("peq").textContent=usd(D.paper_equity);
$("pcap").textContent=usd(D.paper_capital);
const pp=$("pprof");pp.textContent=(D.paper_profit>=0?"+":"")+"$"+D.paper_profit.toFixed(0);
pp.className=D.paper_profit>=0?"pos":"neg";
$("real").textContent=usd(D.real_usdt);
$("kcst").textContent=D.kucoin_ok?"KuCoin ✓ подключён":"KuCoin · ждём депозит";
$("mkt").textContent=D.market_v2_score!=null?"SCORE "+D.market_v2_score+"/100 · "+(D.market_v2_action||"—"):"v2 — нет данных";
$("rank").innerHTML=(D.rank||[]).map((b,i)=>`<tr>
<td class="rank-num">${i+1}</td><td>${b.id} ${b.name.slice(0,14)}</td>
<td>${usd(b.equity)}</td><td class="${b.profit_pct>=0?"pos":"neg"}">${f(b.profit_pct)}</td></tr>`).join("");
const names=(D.rank||[]).slice(0,5).map(b=>b.id+" +"+b.profit_pct.toFixed(0)+"%").join(" · ");
$("tick").textContent="▶ "+(names||"ожидание сделок")+" · PAPER "+(D.paper_profit>=0?"+":"")+D.paper_profit.toFixed(0)+"$";
const verbs=["BUY","SELL","SCAN","TP","SL","HOLD"];
let vi=0;setInterval(()=>{$("tickerTxt").textContent=verbs[vi++%verbs.length]+" · "+verbs[vi%verbs.length]+" · ";},800);
</script></body></html>
